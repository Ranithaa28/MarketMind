services:
  - type: web
    name: marketmind-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: "" # Will need to be set to the Vercel frontend URL

databases:
  - name: marketmind-db
    databaseName: marketmind
    user: marketmind