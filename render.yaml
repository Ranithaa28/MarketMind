services:
  - type: web
    name: marketmind-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: marketmind-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: marketmind-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: marketmind-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: "" # Will need to be set to the Vercel frontend URL

  - type: worker
    name: marketmind-celery
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: "celery -A app.core.celery_app:celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: marketmind-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: marketmind-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: marketmind-redis
          property: connectionString

  - type: redis
    name: marketmind-redis
    ipAllowList: []

databases:
  - name: marketmind-db
    databaseName: marketmind
    user: marketmind